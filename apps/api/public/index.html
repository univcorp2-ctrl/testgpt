<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINE配信 操作設定</title>
    <style>
      body { font-family: sans-serif; margin: 24px; max-width: 780px; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input, select, button { margin-top: 4px; padding: 8px; width: 100%; box-sizing: border-box; }
      button { width: auto; cursor: pointer; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-top: 16px; }
      .ok { color: #0a7a31; }
      .err { color: #b00020; }
      code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>LINE配信サービス 操作設定</h1>
    <p>設定API: <code>/api/settings</code></p>

    <div class="card">
      <h2>配信設定</h2>
      <form id="settingsForm">
        <label>Timezone
          <input id="timezone" value="Asia/Tokyo" required />
        </label>
        <label>Daily Time (HH:mm)
          <input id="dailyTime" value="09:00" pattern="^([01]\d|2[0-3]):[0-5]\d$" required />
        </label>
        <label>Property Source
          <select id="propertySource">
            <option value="sheets">sheets</option>
            <option value="json">json</option>
          </select>
        </label>
        <br />
        <button type="submit">保存</button>
      </form>
      <p id="status"></p>
    </div>

    <div class="card">
      <h2>登録済みLINEグループ</h2>
      <ul id="groups"></ul>
    </div>

    <script>
      async function load() {
        const res = await fetch('/api/settings');
        const data = await res.json();
        timezone.value = data.settings.timezone;
        dailyTime.value = data.settings.dailyTime;
        propertySource.value = data.settings.propertySource;

        groups.innerHTML = '';
        for (const g of data.groups) {
          const li = document.createElement('li');
          li.textContent = `${g.groupId} (lastSentDate: ${g.lastSentDate || '-'})`;
          groups.appendChild(li);
        }
      }

      settingsForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.textContent = '保存中...';
        status.className = '';
        const payload = {
          timezone: timezone.value,
          dailyTime: dailyTime.value,
          propertySource: propertySource.value,
        };
        const res = await fetch('/api/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.ok) {
          status.textContent = '保存しました';
          status.className = 'ok';
        } else {
          status.textContent = '保存に失敗しました';
          status.className = 'err';
        }
        await load();
      });

      load();
    </script>
  </body>
</html>
