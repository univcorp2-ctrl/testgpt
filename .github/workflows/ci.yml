name: CI - test, quality, artifact

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          if find . -maxdepth 3 \( -name 'pyproject.toml' -o -name 'requirements*.txt' -o -name '*.py' \) | grep -q .; then echo "has_python=true" >> "$GITHUB_OUTPUT"; else echo "has_python=false" >> "$GITHUB_OUTPUT"; fi
          if find . -maxdepth 3 \( -name 'package.json' -o -name 'pnpm-lock.yaml' -o -name 'package-lock.json' \) | grep -q .; then echo "has_node=true" >> "$GITHUB_OUTPUT"; else echo "has_node=false" >> "$GITHUB_OUTPUT"; fi

  python-quality:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then pip install -e '.[dev]' || pip install -e .; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff mypy bandit pip-audit
      - name: Lint with ruff
        run: ruff check .
      - name: Type check with mypy
        run: mypy . || true
      - name: Security check with bandit
        run: bandit -r . -x ./.venv,./venv,./tests || true
      - name: Dependency audit
        run: pip-audit || true
      - name: Run tests
        run: pytest -q --maxfail=1
      - name: Write job summary
        if: always()
        run: |
          echo "## Python CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ruff lint executed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pytest executed" >> "$GITHUB_STEP_SUMMARY"

  node-quality:
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install Node dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Type check
        run: npm run typecheck --if-present
      - name: Test
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present
      - name: Upload build artifact
        if: always() && hashFiles('dist/**', 'build/**', '.next/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            build
            .next
          if-no-files-found: ignore
          retention-days: 7
      - name: Write job summary
        if: always()
        run: |
          echo "## Node CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- lint/typecheck/test/build were run when scripts exist" >> "$GITHUB_STEP_SUMMARY"

  ci-summary:
    needs: [detect, python-quality, node-quality]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Final summary
        run: |
          echo "## Harness Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python detected: ${{ needs.detect.outputs.has_python }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node detected: ${{ needs.detect.outputs.has_node }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python job: ${{ needs.python-quality.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node job: ${{ needs.node-quality.result }}" >> "$GITHUB_STEP_SUMMARY"
