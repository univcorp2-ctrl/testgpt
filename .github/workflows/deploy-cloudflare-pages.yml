name: Deploy - Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_dir:
        description: "Directory to deploy. Examples: dist, build, out, site"
        required: false
        default: "dist"

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node when package.json exists
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies when package.json exists
        if: hashFiles('package.json') != ''
        run: npm ci || npm install

      - name: Build when package.json exists
        if: hashFiles('package.json') != ''
        run: npm run build --if-present

      - name: Detect deploy directory
        id: detect
        shell: bash
        run: |
          DEPLOY_DIR="${{ github.event.inputs.deploy_dir || 'dist' }}"
          if [ -d "$DEPLOY_DIR" ]; then
            echo "deploy_dir=$DEPLOY_DIR" >> "$GITHUB_OUTPUT"
          elif [ -d "dist" ]; then
            echo "deploy_dir=dist" >> "$GITHUB_OUTPUT"
          elif [ -d "build" ]; then
            echo "deploy_dir=build" >> "$GITHUB_OUTPUT"
          elif [ -d "out" ]; then
            echo "deploy_dir=out" >> "$GITHUB_OUTPUT"
          elif [ -d "site" ]; then
            echo "deploy_dir=site" >> "$GITHUB_OUTPUT"
          else
            mkdir -p dist
            printf '<!doctype html><meta charset="utf-8"><h1>CI/CD harness deploy placeholder</h1><p>No build output was found. Replace this with your real app build output.</p>' > dist/index.html
            echo "deploy_dir=dist" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Cloudflare secrets
        id: secrets_check
        shell: bash
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ] && [ -n "$CF_PAGES_PROJECT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not fully configured. Build step passed, deploy skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.secrets_check.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ steps.detect.outputs.deploy_dir }} --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}

      - name: Write deploy summary
        if: always()
        run: |
          echo "## Cloudflare Pages Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy directory: ${{ steps.detect.outputs.deploy_dir }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Secrets ready: ${{ steps.secrets_check.outputs.ready }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Required secrets: CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID / CLOUDFLARE_PAGES_PROJECT" >> "$GITHUB_STEP_SUMMARY"
          echo "- If secrets are missing, deploy is intentionally skipped instead of failing." >> "$GITHUB_STEP_SUMMARY"
