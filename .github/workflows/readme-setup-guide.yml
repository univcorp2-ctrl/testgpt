name: README setup guide

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/setup-guide-trigger.md
      - docs/assets/readme-setup-guide.svg
      - docs/setup-visual-guide.md
      - docs/image-generation-prompts.md
      - scripts/prepend_readme_setup_guide.py
      - .github/workflows/readme-setup-guide.yml

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prepend visual setup guide
        run: python scripts/prepend_readme_setup_guide.py
      - name: Commit README update
        run: |
          if git diff --quiet README.md; then
            echo "README.md already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Prepend visual setup guide to README"
          git push
