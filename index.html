<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apartment Optimizer</title>
    <style>
      body {
        font-family: "Noto Sans JP", sans-serif;
        margin: 24px;
        background: #f7f7fb;
        color: #1a1a1a;
      }
      header {
        margin-bottom: 16px;
      }
      textarea {
        width: 100%;
        height: 240px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        font-size: 13px;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .panel {
        background: #fff;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      button {
        background: #1f6feb;
        color: #fff;
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      button:disabled {
        background: #9ab6f2;
        cursor: not-allowed;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #0f172a;
        color: #e2e8f0;
        padding: 12px;
        border-radius: 8px;
        height: 240px;
        overflow: auto;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
      }
      .status {
        font-size: 13px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>アパート最適化ツール</h1>
      <p>config.json を貼り付けて最適化結果を確認できます。</p>
    </header>
    <div class="grid">
      <div class="panel">
        <h2>入力 JSON</h2>
        <textarea id="input" spellcheck="false"></textarea>
        <div class="actions">
          <button id="run">最適化を実行</button>
          <span id="status" class="status"></span>
        </div>
      </div>
      <div class="panel">
        <h2>結果</h2>
        <pre id="output">ここに結果が表示されます。</pre>
      </div>
    </div>
    <script>
      const runButton = document.getElementById("run");
      const statusEl = document.getElementById("status");
      const inputEl = document.getElementById("input");
      const outputEl = document.getElementById("output");

      async function runOptimization() {
        runButton.disabled = true;
        statusEl.textContent = "計算中...";
        outputEl.textContent = "";
        try {
          const response = await fetch("/optimize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: inputEl.value,
          });
          const data = await response.json();
          outputEl.textContent = JSON.stringify(data, null, 2);
          if (!response.ok) {
            statusEl.textContent = "エラーが発生しました";
          } else {
            statusEl.textContent = "完了";
          }
        } catch (error) {
          outputEl.textContent = JSON.stringify({ error: String(error) }, null, 2);
          statusEl.textContent = "通信に失敗しました";
        } finally {
          runButton.disabled = false;
        }
      }

      runButton.addEventListener("click", runOptimization);
    </script>
  </body>
</html>
