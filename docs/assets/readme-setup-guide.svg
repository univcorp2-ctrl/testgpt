<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="README初期設定ガイド"><rect width="1200" height="720" rx="28" fill="#f6f8fa"/><text x="60" y="78" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#0f172a">README 画像付き初期設定ガイド</text><text x="60" y="122" font-family="Arial, sans-serif" font-size="20" fill="#475569">このリポジトリを初めて開いた人が、上から順番に設定できる導線です。</text><g transform="translate(60 170)"><rect width="300" height="170" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><text x="28" y="48" font-family="Arial" font-size="26" font-weight="700" fill="#1e3a8a">1. READMEを見る</text><text x="28" y="86" font-family="Arial" font-size="18" fill="#1e40af">目的・必要なSecret・実行手順を確認</text><text x="28" y="124" font-family="Arial" font-size="18" fill="#1e40af">docs/setup-visual-guide.md へ進む</text></g><g transform="translate(450 170)"><rect width="300" height="170" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><text x="28" y="48" font-family="Arial" font-size="26" font-weight="700" fill="#14532d">2. Secrets設定</text><text x="28" y="86" font-family="Arial" font-size="18" fill="#166534">GitHub / Cloudflare / 外部APIの値を登録</text><text x="28" y="124" font-family="Arial" font-size="18" fill="#166534">値は必ず ******** でマスク</text></g><g transform="translate(840 170)"><rect width="300" height="170" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="3"/><text x="28" y="48" font-family="Arial" font-size="26" font-weight="700" fill="#78350f">3. Actions実行</text><text x="28" y="86" font-family="Arial" font-size="18" fill="#92400e">Actions → workflow_dispatch</text><text x="28" y="124" font-family="Arial" font-size="18" fill="#92400e">Run workflow を押す</text></g><g transform="translate(255 430)"><rect width="300" height="170" rx="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/><text x="28" y="48" font-family="Arial" font-size="26" font-weight="700" fill="#4c1d95">4. 結果確認</text><text x="28" y="86" font-family="Arial" font-size="18" fill="#5b21b6">ログ・レポート・artifactを確認</text><text x="28" y="124" font-family="Arial" font-size="18" fill="#5b21b6">CSV / Excel / TXTを取得</text></g><g transform="translate(645 430)"><rect width="300" height="170" rx="20" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/><text x="28" y="48" font-family="Arial" font-size="26" font-weight="700" fill="#7f1d1d">5. エラー対応</text><text x="28" y="86" font-family="Arial" font-size="18" fill="#991b1b">まずActionsログを見る</text><text x="28" y="124" font-family="Arial" font-size="18" fill="#991b1b">認証・Secret名・権限を確認</text></g><path d="M365 255 H435" stroke="#64748b" stroke-width="8" stroke-linecap="round"/><path d="M755 255 H825" stroke="#64748b" stroke-width="8" stroke-linecap="round"/><path d="M990 350 C990 390 920 415 855 425" stroke="#64748b" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M555 515 H635" stroke="#64748b" stroke-width="8" stroke-linecap="round"/><text x="60" y="675" font-family="Arial" font-size="18" fill="#64748b">詳細: docs/setup-visual-guide.md / 画像再生成プロンプト: docs/image-generation-prompts.md</text></svg>